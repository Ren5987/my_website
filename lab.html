<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Rajesh Basnet</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f4f4f5;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .brand { text-align: center; margin-bottom: 2rem; }
    .brand h1 { font-size: 1.6rem; font-weight: 600; color: #18181b; margin-bottom: 0.25rem; }
    .brand p { font-size: 0.85rem; color: #71717a; }

    .tabs {
      display: flex;
      background: #f4f4f5;
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 1.75rem;
    }

    .tab {
      flex: 1; padding: 0.5rem; border: none; background: transparent;
      font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500;
      color: #71717a; cursor: pointer; border-radius: 6px; transition: all 0.2s;
    }
    .tab.active { background: #fff; color: #18181b; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .form-group { margin-bottom: 1rem; }

    label { display: block; font-size: 0.82rem; font-weight: 500; color: #3f3f46; margin-bottom: 0.4rem; }

    input {
      width: 100%; padding: 0.65rem 0.85rem; border: 1.5px solid #e4e4e7;
      border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem;
      color: #18181b; outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: #fff;
    }
    input:focus { border-color: #18181b; box-shadow: 0 0 0 3px rgba(24,24,27,0.08); }
    input::placeholder { color: #a1a1aa; }

    .forgot {
      display: block; text-align: right; font-size: 0.78rem; color: #71717a;
      cursor: pointer; margin-top: 0.3rem; text-decoration: underline;
      background: none; border: none; font-family: 'Inter', sans-serif;
    }
    .forgot:hover { color: #18181b; }

    .btn {
      width: 100%; padding: 0.75rem; margin-top: 1.25rem; background: #18181b;
      color: #fff; border: none; border-radius: 8px; font-family: 'Inter', sans-serif;
      font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s, opacity 0.2s;
    }
    .btn:hover { background: #27272a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider { text-align: center; font-size: 0.75rem; color: #a1a1aa; margin: 0.75rem 0 0; }
    .divider a { color: #18181b; font-weight: 500; cursor: pointer; text-decoration: underline; }

    .msg { font-size: 0.8rem; padding: 0.65rem 0.85rem; border-radius: 8px; margin-top: 1rem; display: none; line-height: 1.5; }
    .msg.show { display: block; }
    .msg.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .msg.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .msg.info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

    .loading { text-align: center; padding: 2rem 0; color: #a1a1aa; font-size: 0.85rem; display: none; }
    .loading.show { display: block; }

    .dashboard { display: none; }
    .dashboard.show { display: block; }

    .welcome-screen { text-align: center; padding: 1rem 0; }

    .avatar {
      width: 64px; height: 64px; background: #18181b; color: #fff;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 600; margin: 0 auto 1.25rem;
    }

    .greeting {
      font-size: 1.4rem;
      font-weight: 600;
      color: #18181b;
      margin-bottom: 0.3rem;
    }

    .greeting span {
      color: #2563eb;
    }

    .email-badge {
      display: inline-block; background: #f4f4f5; color: #71717a;
      font-size: 0.78rem; padding: 0.25rem 0.75rem;
      border-radius: 100px; margin-bottom: 0.75rem;
    }

    .time-msg {
      font-size: 0.85rem;
      color: #71717a;
      margin-bottom: 1.5rem;
    }

    .btn-outline {
      background: transparent; color: #71717a;
      border: 1.5px solid #e4e4e7; margin-top: 0;
    }
    .btn-outline:hover { background: #f4f4f5; color: #18181b; }
  </style>
</head>
<body>

  <div class="card">

    <div class="loading show" id="loading">Loading...</div>

    <!-- Auth Section -->
    <div id="authSection" style="display:none;">
      <div class="brand">
        <h1>Welcome</h1>
        <p>Sign in to your account</p>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Login -->
      <div id="loginForm">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" />
          <button class="forgot" onclick="handleForgot()">Forgot password?</button>
        </div>
        <div class="msg error" id="loginError"></div>
        <div class="msg info" id="loginInfo"></div>
        <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
        <p class="divider">Don't have an account? <a onclick="switchTab('signup')">Sign up</a></p>
      </div>

      <!-- Signup -->
      <div id="signupForm" style="display:none;">
        <div class="form-group">
          <label>Your name</label>
          <input type="text" id="signupName" placeholder="e.g. John" />
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min. 6 characters" />
        </div>
        <div class="form-group">
          <label>Confirm password</label>
          <input type="password" id="signupConfirm" placeholder="Repeat password" />
        </div>
        <div class="msg error" id="signupError"></div>
        <div class="msg success" id="signupSuccess"></div>
        <button class="btn" id="signupBtn" onclick="handleSignup()">Create Account</button>
        <p class="divider">Already have an account? <a onclick="switchTab('login')">Sign in</a></p>
      </div>
    </div>

    <!-- Dashboard with greeting -->
    <div class="dashboard" id="dashboard">
      <div class="welcome-screen">
        <div class="avatar" id="avatarLetter">?</div>
        <div class="greeting">Hello, <span id="greetName"></span>! 👋</div>
        <div class="email-badge" id="userEmail"></div>
        <p class="time-msg" id="timeMsg"></p>
        <button class="btn btn-outline" onclick="handleLogout()">Sign Out</button>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
      sendEmailVerification, sendPasswordResetEmail, onAuthStateChanged,
      signOut, updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtEF2vPuy_ItSZy8Fmynh-Kr6wFZbjbCg",
      authDomain: "rajesh-lab-8b6ef.firebaseapp.com",
      projectId: "rajesh-lab-8b6ef",
      storageBucket: "rajesh-lab-8b6ef.firebasestorage.app",
      messagingSenderId: "460748884560",
      appId: "1:460748884560:web:73b9981e2a94c1c1809f55"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      document.getElementById('loading').classList.remove('show');
      if (user && user.emailVerified) {
        showDashboard(user);
      } else {
        document.getElementById('authSection').style.display = 'block';
      }
    });

    window.handleLogin = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      const info = document.getElementById('loginInfo');
      if (!email || !pass) return showMsg(err, 'Please fill in all fields.');
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const result = await signInWithEmailAndPassword(auth, email, pass);
        if (!result.user.emailVerified) {
          await signOut(auth);
          showMsg(info, '📧 Please verify your email before signing in. Check your inbox.');
          btn.disabled = false; btn.textContent = 'Sign In'; return;
        }
        showDashboard(result.user);
      } catch (e) {
        const m = {
          'auth/user-not-found': 'No account found with this email.',
          'auth/wrong-password': 'Incorrect password.',
          'auth/invalid-credential': 'Invalid email or password.',
          'auth/too-many-requests': 'Too many attempts. Try again later.'
        };
        showMsg(err, m[e.code] || 'Sign in failed. Please try again.');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    };

    window.handleSignup = async () => {
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const pass = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const btn = document.getElementById('signupBtn');
      const err = document.getElementById('signupError');
      const success = document.getElementById('signupSuccess');

      if (!name || !email || !pass || !confirm) return showMsg(err, 'Please fill in all fields.');
      if (!email.includes('@')) return showMsg(err, 'Please enter a valid email address.');
      if (pass.length < 6) return showMsg(err, 'Password must be at least 6 characters.');
      if (pass !== confirm) return showMsg(err, 'Passwords do not match.');

      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const result = await createUserWithEmailAndPassword(auth, email, pass);
        // Save name to Firebase profile
        await updateProfile(result.user, { displayName: name });
        await sendEmailVerification(result.user);
        await signOut(auth);
        showMsg(success, `✅ Hi ${name}! Your account is created. Please check ${email} to verify, then sign in.`);
        btn.disabled = false; btn.textContent = 'Create Account';
        setTimeout(() => switchTab('login'), 5000);
      } catch (e) {
        const m = {
          'auth/email-already-in-use': 'An account with this email already exists.',
          'auth/weak-password': 'Password is too weak.'
        };
        showMsg(err, m[e.code] || 'Sign up failed. Please try again.');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    };

    window.handleForgot = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const info = document.getElementById('loginInfo');
      const err = document.getElementById('loginError');
      if (!email) return showMsg(err, 'Enter your email address above first.');
      try {
        await sendPasswordResetEmail(auth, email);
        showMsg(info, `📧 Password reset link sent to ${email}.`);
      } catch (e) { showMsg(err, 'Could not send reset email. Check the address.'); }
    };

    window.handleLogout = async () => {
      await signOut(auth);
      document.getElementById('dashboard').classList.remove('show');
      document.getElementById('authSection').style.display = 'block';
      switchTab('login');
    };

    function getTimeGreeting() {
      const h = new Date().getHours();
      if (h < 12) return 'Good morning! Have a great day. ☀️';
      if (h < 17) return 'Good afternoon! Hope you\'re doing well. 🌤️';
      return 'Good evening! Hope you had a great day. 🌙';
    }

    function showDashboard(user) {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('dashboard').classList.add('show');
      const name = user.displayName || user.email.split('@')[0];
      document.getElementById('greetName').textContent = name;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('avatarLetter').textContent = name[0].toUpperCase();
      document.getElementById('timeMsg').textContent = getTimeGreeting();
    }

    function showMsg(el, text) {
      el.textContent = text; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 6000);
    }

    window.switchTab = (tab) => {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
      });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
    };
  </script>

</body>
</html>
